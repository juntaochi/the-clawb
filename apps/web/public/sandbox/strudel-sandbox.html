<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  /* Hide the CodeMirror editor UI — code is controlled programmatically via postMessage */
  strudel-editor { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; }
</style>
</head>
<body>
<!--
  Shim localStorage/sessionStorage BEFORE loading any library.
  sandbox="allow-scripts" (without allow-same-origin) blocks storage access.
-->
<script>
try { localStorage.getItem("_"); } catch(e) {
  var ns = { getItem:function(){return null}, setItem:function(){}, removeItem:function(){}, clear:function(){}, key:function(){return null}, length:0 };
  Object.defineProperty(window, "localStorage", { value: ns, writable: false });
  Object.defineProperty(window, "sessionStorage", { value: ns, writable: false });
}
</script>

<!--
  Load @strudel/repl IIFE bundle from unpkg (2.2MB).
  Includes ALL sub-packages in ONE bundle with ONE @strudel/core instance.
  Registers <strudel-editor> custom element.
-->
<script src="https://unpkg.com/@strudel/repl@1.3.0"></script>

<!--
  The <strudel-editor> web component handles everything:
  - initStrudel + prebake (all sounds, soundfonts, draw, samples)
  - AudioContext creation + user gesture handling (initAudioOnFirstClick)
  - Code transpilation and evaluation
  We hide the CodeMirror UI and control it programmatically.
-->
<strudel-editor id="repl">
  <!--
  // waiting for code
  -->
</strudel-editor>

<script>
var repl = document.getElementById("repl");
var analyser = null;
var rafId = null;
var isReady = false;

// FFT analysis constants
var NUM_BINS = 5, FFT_SIZE = 4096;
var FREQ_EDGES = [20, 80, 250, 1000, 4000, 20000];

// Debug: log what's available
console.log("[StrudelSandbox] strudel keys:", Object.keys(window.strudel || {}));

// --- Detect readiness ---
// The web component handles AudioContext init on first user click.
// We poll for the editor to be available and AudioContext to be running.

function tryGetAudioContext() {
  // Try multiple access paths
  if (typeof getAudioContext === "function") return getAudioContext();
  var e = repl.editor;
  if (e) {
    if (typeof e.getAudioContext === "function") return e.getAudioContext();
    if (e.repl && typeof e.repl.getAudioContext === "function") return e.repl.getAudioContext();
  }
  // Search through the global strudel object
  var S = window.strudel || {};
  if (typeof S.getAudioContext === "function") return S.getAudioContext();
  return null;
}

function checkReady() {
  if (isReady) return;
  var ctx = tryGetAudioContext();
  if (ctx && ctx.state === "running") {
    isReady = true;
    clearInterval(readyPoll);
    console.log("[StrudelSandbox] ready! AudioContext:", ctx.state);
    setupAnalyser(ctx);
    parent.postMessage({ type: "ready" }, "*");
  }
}

var readyPoll = setInterval(checkReady, 300);

// Also check shortly after user gestures (the component inits on click)
["click", "keydown", "touchstart"].forEach(function(evt) {
  document.addEventListener(evt, function() {
    setTimeout(checkReady, 500);
    setTimeout(checkReady, 1500);
    setTimeout(checkReady, 3000);
  });
});

// --- FFT Analysis ---

function setupAnalyser(ctx) {
  try {
    analyser = ctx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    analyser.smoothingTimeConstant = 0.4;

    // Try to connect to superdough's output
    function tryConnect() {
      var S = window.strudel || {};
      var getCtrl = S.getSuperdoughAudioController;
      if (typeof getCtrl !== "function") {
        // Try global
        if (typeof getSuperdoughAudioController === "function") getCtrl = getSuperdoughAudioController;
        else return false;
      }
      var ctrl = getCtrl();
      if (ctrl && ctrl.output && ctrl.output.destinationGain) {
        ctrl.output.destinationGain.connect(analyser);
        return true;
      }
      return false;
    }

    if (!tryConnect()) {
      var retries = 0;
      var iv = setInterval(function() {
        retries++;
        if (tryConnect()) { clearInterval(iv); startFftLoop(ctx); }
        else if (retries >= 20) clearInterval(iv);
      }, 200);
      return;
    }
    startFftLoop(ctx);
  } catch (err) {
    console.warn("[StrudelSandbox] analyser error:", err);
  }
}

function startFftLoop(ctx) {
  if (rafId !== null || !analyser) return;
  var bufLen = analyser.frequencyBinCount;
  var dataArr = new Float32Array(bufLen);
  var binHz = ctx.sampleRate / FFT_SIZE;
  var binRanges = [];
  for (var i = 0; i < NUM_BINS; i++) {
    binRanges.push([
      Math.max(0, Math.round(FREQ_EDGES[i] / binHz)),
      Math.min(bufLen - 1, Math.round(FREQ_EDGES[i + 1] / binHz))
    ]);
  }
  var fft = new Float32Array(NUM_BINS);
  var timeData = new Float32Array(analyser.fftSize);
  var lastSend = 0, SCOPE_N = 512;

  function loop() {
    analyser.getFloatFrequencyData(dataArr);
    for (var i = 0; i < NUM_BINS; i++) {
      var lo = binRanges[i][0], hi = binRanges[i][1];
      var sum = 0, cnt = hi - lo + 1;
      for (var j = lo; j <= hi; j++) sum += dataArr[j];
      fft[i] = Math.max(0, Math.min(1, (sum / cnt + 70) / 60));
    }
    var now = performance.now();
    if (now - lastSend >= 33) {
      lastSend = now;
      analyser.getFloatTimeDomainData(timeData);
      var step = Math.floor(timeData.length / SCOPE_N);
      var scope = new Float32Array(SCOPE_N);
      for (var i = 0; i < SCOPE_N; i++) scope[i] = timeData[i * step];
      var FN = 256, fStep = Math.floor(bufLen / FN);
      var freq = new Float32Array(FN);
      for (var i = 0; i < FN; i++) freq[i] = dataArr[i * fStep];
      parent.postMessage({ type: "audio", fft: Array.from(fft), scope: Array.from(scope), freq: Array.from(freq) }, "*");
    }
    rafId = requestAnimationFrame(loop);
  }
  loop();
}

// --- postMessage bridge ---

window.addEventListener("message", function(e) {
  var d = e.data || {};

  if (d.type === "eval") {
    if (!isReady || !repl.editor) {
      parent.postMessage({ type: "error", message: "not initialized" }, "*");
      return;
    }
    try {
      // Set code on the component
      repl.setAttribute("code", d.code);
      // Try to trigger evaluation via the editor
      var editor = repl.editor;
      var evalP;
      if (typeof editor.evaluate === "function") {
        evalP = editor.evaluate(d.code);
      } else if (editor.repl && typeof editor.repl.evaluate === "function") {
        evalP = editor.repl.evaluate(d.code);
      } else {
        // Fallback: try global evaluate
        if (typeof evaluate === "function") {
          evalP = evaluate(d.code);
        } else {
          parent.postMessage({ type: "error", message: "no evaluate function found" }, "*");
          return;
        }
      }
      // Handle promise or sync result
      Promise.resolve(evalP)
        .then(function() {
          parent.postMessage({ type: "ack" }, "*");
          // Retry analyser connection after first eval
          if (!rafId) {
            var ctx = tryGetAudioContext();
            if (ctx) setupAnalyser(ctx);
          }
        })
        ["catch"](function(err) {
          parent.postMessage({ type: "error", message: String(err) }, "*");
        });
    } catch (err) {
      parent.postMessage({ type: "error", message: String(err) }, "*");
    }
    return;
  }

  if (d.type === "hush") {
    try {
      var editor = repl.editor;
      if (editor && typeof editor.stop === "function") editor.stop();
      else if (typeof hush === "function") hush();
      parent.postMessage({ type: "ack" }, "*");
    } catch (err) {
      parent.postMessage({ type: "error", message: String(err) }, "*");
    }
    return;
  }

  if (d.type === "init") {
    // The web component handles init via user gesture — nothing extra needed
    return;
  }
});
</script>
</body>
</html>
