<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
</style>
</head>
<body>
<!--
  Shim localStorage/sessionStorage BEFORE loading any library.
  sandbox="allow-scripts" (without allow-same-origin) blocks storage access.
  The @strudel/repl bundle may reference localStorage for settings persistence.
-->
<script>
try { localStorage.getItem("_"); } catch(e) {
  var ns = { getItem:function(){return null}, setItem:function(){}, removeItem:function(){}, clear:function(){}, key:function(){return null}, length:0 };
  Object.defineProperty(window, "localStorage", { value: ns, writable: false });
  Object.defineProperty(window, "sessionStorage", { value: ns, writable: false });
}
</script>

<!--
  Load @strudel/repl as a single IIFE bundle from unpkg (2.2MB).
  This is the SAME code that powers strudel.cc — it includes ALL sub-packages
  (@strudel/core, @strudel/web, @strudel/draw, @strudel/soundfonts, @strudel/mini,
  @strudel/tonal, @strudel/hydra, @strudel/midi, @strudel/codemirror) in ONE bundle.
  Because everything is compiled into a single IIFE, there is exactly ONE instance
  of @strudel/core — no duplicate registries, no import map hacks.
  Exposes: window.strudel = { initStrudel, evaluate, hush, prebake, Pattern, ... }
-->
<script src="https://unpkg.com/@strudel/repl@1.3.0"></script>

<script>
// Strudel Sandbox — runs inside a sandboxed iframe (allow-scripts only).
// Communication is exclusively via postMessage.

// FFT analysis constants — mirrors use-strudel-audio-bridge.ts
var NUM_BINS = 5;
var FFT_SIZE = 4096;
var FREQ_EDGES = [20, 80, 250, 1000, 4000, 20000];

var analyser = null;
var rafId = null;
var isReady = false;

// The IIFE bundle exposes everything on window.strudel
var S = window.strudel || {};

function doInit() {
  try {
    // initStrudel sets up AudioContext, superdough, default oscillators.
    // The prebake from @strudel/repl loads all default sounds, soundfonts,
    // draw methods, ZZFX, drum machines — exactly like strudel.cc.
    var initFn = S.initStrudel || S.initstrudel;
    if (!initFn) {
      throw new Error("initStrudel not found on strudel global");
    }

    return initFn({ prebake: S.prebake })
      .then(function() {
        // Ensure AudioContext is running
        var getCtx = S.getAudioContext;
        if (typeof getCtx === "function") {
          var ctx = getCtx();
          if (ctx.state === "suspended") return ctx.resume();
        }
      })
      .then(function() {
        setupAnalyser();
        isReady = true;
        parent.postMessage({ type: "ready" }, "*");
      });
  } catch (err) {
    parent.postMessage({ type: "error", message: "init failed: " + String(err) }, "*");
    return Promise.reject(err);
  }
}

function setupAnalyser() {
  try {
    var getCtx = S.getAudioContext;
    var getCtrl = S.getSuperdoughAudioController;
    if (typeof getCtx !== "function" || typeof getCtrl !== "function") {
      console.warn("[StrudelSandbox] analyser exports not found");
      return;
    }

    var ctx = getCtx();
    analyser = ctx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    analyser.smoothingTimeConstant = 0.4;

    var ctrl = getCtrl();
    if (ctrl && ctrl.output && ctrl.output.destinationGain) {
      ctrl.output.destinationGain.connect(analyser);
    } else {
      var retries = 0;
      var iv = setInterval(function() {
        retries++;
        var c = getCtrl();
        if (c && c.output && c.output.destinationGain) {
          c.output.destinationGain.connect(analyser);
          clearInterval(iv);
          startFftLoop(ctx);
        } else if (retries >= 10) {
          clearInterval(iv);
        }
      }, 200);
      return;
    }
    startFftLoop(ctx);
  } catch (err) {
    console.warn("[StrudelSandbox] analyser setup error:", err);
  }
}

function startFftLoop(ctx) {
  if (rafId !== null || !analyser) return;

  var bufLen = analyser.frequencyBinCount;
  var dataArr = new Float32Array(bufLen);
  var binHz = ctx.sampleRate / FFT_SIZE;
  var binRanges = [];
  for (var i = 0; i < NUM_BINS; i++) {
    binRanges.push([
      Math.max(0, Math.round(FREQ_EDGES[i] / binHz)),
      Math.min(bufLen - 1, Math.round(FREQ_EDGES[i + 1] / binHz))
    ]);
  }
  var fft = new Float32Array(NUM_BINS);
  var timeData = new Float32Array(analyser.fftSize);
  var lastSend = 0;
  var SEND_IV = 33;
  var SCOPE_N = 512;

  function loop() {
    analyser.getFloatFrequencyData(dataArr);
    for (var i = 0; i < NUM_BINS; i++) {
      var lo = binRanges[i][0], hi = binRanges[i][1];
      var sum = 0, cnt = hi - lo + 1;
      for (var j = lo; j <= hi; j++) sum += dataArr[j];
      fft[i] = Math.max(0, Math.min(1, (sum / cnt + 70) / 60));
    }
    var now = performance.now();
    if (now - lastSend >= SEND_IV) {
      lastSend = now;
      analyser.getFloatTimeDomainData(timeData);
      var step = Math.floor(timeData.length / SCOPE_N);
      var scope = new Float32Array(SCOPE_N);
      for (var i = 0; i < SCOPE_N; i++) scope[i] = timeData[i * step];
      var FN = 256, fStep = Math.floor(bufLen / FN);
      var freq = new Float32Array(FN);
      for (var i = 0; i < FN; i++) freq[i] = dataArr[i * fStep];
      parent.postMessage({
        type: "audio",
        fft: Array.from(fft),
        scope: Array.from(scope),
        freq: Array.from(freq),
      }, "*");
    }
    rafId = requestAnimationFrame(loop);
  }
  loop();
}

// User gesture to unlock AudioContext
var initInProgress = false;
function onUserGesture() {
  if (initInProgress) return;
  initInProgress = true;
  doInit().then(function() {
    document.removeEventListener("click", onUserGesture);
    document.removeEventListener("keydown", onUserGesture);
    document.removeEventListener("touchstart", onUserGesture);
  })["catch"](function() {
    initInProgress = false;
  });
}
document.addEventListener("click", onUserGesture);
document.addEventListener("keydown", onUserGesture);
document.addEventListener("touchstart", onUserGesture);

// postMessage bridge
window.addEventListener("message", function(e) {
  var d = e.data || {};

  if (d.type === "init") {
    doInit();
    return;
  }

  if (d.type === "eval") {
    if (!isReady) {
      parent.postMessage({ type: "error", message: "not initialized" }, "*");
      return;
    }
    var evalFn = S.evaluate;
    if (typeof evalFn !== "function") {
      parent.postMessage({ type: "error", message: "evaluate not available" }, "*");
      return;
    }
    evalFn(d.code)
      .then(function() {
        parent.postMessage({ type: "ack" }, "*");
        if (!rafId && analyser) {
          var ctx = S.getAudioContext();
          var ctrl = S.getSuperdoughAudioController();
          if (ctrl && ctrl.output && ctrl.output.destinationGain) {
            try { ctrl.output.destinationGain.connect(analyser); } catch(x){}
            startFftLoop(ctx);
          }
        } else if (!analyser) {
          setupAnalyser();
        }
      })
      ["catch"](function(err) {
        parent.postMessage({ type: "error", message: String(err) }, "*");
      });
    return;
  }

  if (d.type === "hush") {
    try {
      var hushFn = S.hush;
      if (typeof hushFn === "function") hushFn();
      parent.postMessage({ type: "ack" }, "*");
    } catch (err) {
      parent.postMessage({ type: "error", message: String(err) }, "*");
    }
    return;
  }
});
</script>
</body>
</html>
