<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  /* Show strudel-editor canvas (pianoroll etc.) but hide the CodeMirror code editor.
     The parent app renders its own code panel on top. */
  strudel-editor { display: block; width: 100%; height: 100%; background: transparent; }
  /* Hide CodeMirror editor — all .cm- elements */
  .cm-editor, .cm-scroller, .cm-content { display: none !important; }
  /* Hide any play/stop buttons the component renders */
  button { display: none !important; }
</style>
</head>
<body>
<script>
// === Shims — MUST run before any library loads ===

// 1) localStorage/sessionStorage shim for sandbox="allow-scripts"
try { localStorage.getItem("_"); } catch(e) {
  var ns = { getItem:function(){return null}, setItem:function(){}, removeItem:function(){}, clear:function(){}, key:function(){return null}, length:0 };
  Object.defineProperty(window, "localStorage", { value: ns, writable: false });
  Object.defineProperty(window, "sessionStorage", { value: ns, writable: false });
}

// 2) Capture AudioContext instance created by Strudel.
//    The web component creates AudioContext internally with no public accessor.
//    We intercept the constructor so we can hook up FFT analysis later.
var __capturedAudioCtx = null;
var __OrigAudioContext = window.AudioContext || window.webkitAudioContext;
if (__OrigAudioContext) {
  var PatchedAudioContext = function AudioContext(opts) {
    var ctx = new __OrigAudioContext(opts);
    __capturedAudioCtx = ctx;
    return ctx;
  };
  PatchedAudioContext.prototype = __OrigAudioContext.prototype;
  window.AudioContext = PatchedAudioContext;
  if (window.webkitAudioContext) window.webkitAudioContext = PatchedAudioContext;
}
</script>

<!--
  Load @strudel/repl IIFE bundle (2.2MB) — ALL sub-packages in ONE bundle.
  ONE @strudel/core instance. Registers <strudel-editor> custom element.
-->
<script src="https://unpkg.com/@strudel/repl@1.3.0"></script>

<!-- The web component handles init, prebake, AudioContext, code eval -->
<strudel-editor id="repl">
  <!--
  // waiting
  -->
</strudel-editor>

<script>
var repl = document.getElementById("repl");
var analyser = null;
var rafId = null;
var isReady = false;

// FFT analysis constants
var NUM_BINS = 5, FFT_SIZE = 4096;
var FREQ_EDGES = [20, 80, 250, 1000, 4000, 20000];

// --- Detect readiness via captured AudioContext ---

function checkReady() {
  if (isReady) return;
  var ctx = __capturedAudioCtx;
  if (ctx && ctx.state === "running") {
    isReady = true;
    clearInterval(readyPoll);
    console.log("[StrudelSandbox] ready! ctx.state:", ctx.state, "editor:", !!repl.editor);
    setupAnalyser(ctx);
    parent.postMessage({ type: "ready" }, "*");
  }
}

var readyPoll = setInterval(checkReady, 200);

// Also check after user gestures (component inits AudioContext on click)
["click", "keydown", "touchstart"].forEach(function(evt) {
  document.addEventListener(evt, function() {
    setTimeout(checkReady, 300);
    setTimeout(checkReady, 1000);
    setTimeout(checkReady, 2500);
  });
});

// --- Code evaluation ---

function evalCode(code) {
  var editor = repl.editor;
  if (!editor) {
    return Promise.reject(new Error("editor not available"));
  }
  // Set code on the editor FIRST, then evaluate (no args — evaluates current content).
  // StrudelMirror.evaluate() reads from the CodeMirror editor, not from an argument.
  repl.setAttribute("code", code);
  return Promise.resolve(editor.evaluate());
}

function stopPlayback() {
  var editor = repl.editor;
  if (editor && typeof editor.stop === "function") return editor.stop();
  if (editor && editor.repl && typeof editor.repl.stop === "function") return editor.repl.stop();
  if (typeof hush === "function") return hush();
}

// --- FFT Analysis ---

function setupAnalyser(ctx) {
  try {
    analyser = ctx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    analyser.smoothingTimeConstant = 0.4;

    // Connect to superdough destination — may not be wired yet
    function tryConnect() {
      // Try to find destination node to tap into
      if (ctx.destination) {
        // Try connecting via the destination
        try {
          // Look for superdough controller via global
          if (typeof getSuperdoughAudioController === "function") {
            var ctrl = getSuperdoughAudioController();
            if (ctrl && ctrl.output && ctrl.output.destinationGain) {
              ctrl.output.destinationGain.connect(analyser);
              return true;
            }
          }
        } catch(e) {}
      }
      return false;
    }

    if (!tryConnect()) {
      var retries = 0;
      var iv = setInterval(function() {
        retries++;
        if (tryConnect()) { clearInterval(iv); startFftLoop(ctx); }
        else if (retries >= 30) clearInterval(iv);
      }, 300);
      return;
    }
    startFftLoop(ctx);
  } catch (err) {
    console.warn("[StrudelSandbox] analyser error:", err);
  }
}

function startFftLoop(ctx) {
  if (rafId !== null || !analyser) return;
  var bufLen = analyser.frequencyBinCount;
  var dataArr = new Float32Array(bufLen);
  var binHz = ctx.sampleRate / FFT_SIZE;
  var binRanges = [];
  for (var i = 0; i < NUM_BINS; i++) {
    binRanges.push([
      Math.max(0, Math.round(FREQ_EDGES[i] / binHz)),
      Math.min(bufLen - 1, Math.round(FREQ_EDGES[i + 1] / binHz))
    ]);
  }
  var fft = new Float32Array(NUM_BINS);
  var timeData = new Float32Array(analyser.fftSize);
  var lastSend = 0, SCOPE_N = 512;

  function loop() {
    analyser.getFloatFrequencyData(dataArr);
    for (var i = 0; i < NUM_BINS; i++) {
      var lo = binRanges[i][0], hi = binRanges[i][1];
      var sum = 0, cnt = hi - lo + 1;
      for (var j = lo; j <= hi; j++) sum += dataArr[j];
      fft[i] = Math.max(0, Math.min(1, (sum / cnt + 70) / 60));
    }
    var now = performance.now();
    if (now - lastSend >= 33) {
      lastSend = now;
      analyser.getFloatTimeDomainData(timeData);
      var step = Math.floor(timeData.length / SCOPE_N);
      var scope = new Float32Array(SCOPE_N);
      for (var i = 0; i < SCOPE_N; i++) scope[i] = timeData[i * step];
      var FN = 256, fStep = Math.floor(bufLen / FN);
      var freq = new Float32Array(FN);
      for (var i = 0; i < FN; i++) freq[i] = dataArr[i * fStep];
      parent.postMessage({ type: "audio", fft: Array.from(fft), scope: Array.from(scope), freq: Array.from(freq) }, "*");
    }
    rafId = requestAnimationFrame(loop);
  }
  loop();
}

// --- postMessage bridge ---

window.addEventListener("message", function(e) {
  var d = e.data || {};

  if (d.type === "eval") {
    if (!isReady) {
      parent.postMessage({ type: "error", message: "not initialized" }, "*");
      return;
    }
    evalCode(d.code)
      .then(function() {
        parent.postMessage({ type: "ack" }, "*");
        if (!rafId && __capturedAudioCtx) setupAnalyser(__capturedAudioCtx);
      })
      ["catch"](function(err) {
        parent.postMessage({ type: "error", message: String(err) }, "*");
      });
    return;
  }

  if (d.type === "hush") {
    try {
      stopPlayback();
      parent.postMessage({ type: "ack" }, "*");
    } catch (err) {
      parent.postMessage({ type: "error", message: String(err) }, "*");
    }
    return;
  }
});
</script>
</body>
</html>
